<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
        <title>Freezlet</title>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
        <style>
            .word-list { max-height: 400px; overflow-y: auto; }
            .word-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: #f9f9f9; border-radius: 8px; margin-bottom: 8px; gap: 10px; }
            .word-item .word-main { flex: 1; min-width: 0; }
            .word-item .word { font-weight: 600; color: #667eea; font-size: 15px; }
            .word-item .transcription { color: #999; font-size: 13px; font-style: italic; margin-left: 6px; }
            .word-item .translation { color: #666; margin-left: 10px; font-size: 14px; }
            .word-item .actions { display: flex; gap: 5px; flex-shrink: 0; }
            .word-item .action-btn { background: #667eea; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 12px; }
            .word-item .action-btn.delete { background: #ff4757; }
            .word-item .action-btn.speak { background: #51cf66; }
            .empty { text-align: center; padding: 40px; color: #999; }
            
            body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); font-family: 'Arial', sans-serif; margin: 0; padding: 20px; padding-bottom: 80px; }
            .container { max-width: 700px; margin: 0 auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
            
            .tabs { display: flex; gap: 10px; margin-bottom: 25px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
            .nav-btn { background: none; border: none; padding: 12px 20px; cursor: pointer; font-size: 16px; color: #888; border-bottom: 3px solid transparent; transition: all 0.3s; }
            .nav-btn:hover { color: #667eea; }
            .nav-btn.active { color: #667eea; border-bottom-color: #667eea; font-weight: 600; }
            .nav-btn.add-btn { margin-left: auto; color: #667eea; font-size: 24px; padding: 8px 16px; }
            
            h1 { text-align: center; color: #667eea; margin-bottom: 25px; font-family: 'Verdana', sans-serif; }
            h2 { color: #333; margin-bottom: 15px; }
            
            button.primary { background: #667eea; color: white; border: none; padding: 12px 24px; border-radius: 10px; font-size: 15px; cursor: pointer; width: 100%; margin-top: 15px; }
            button.primary:hover { background: #5568d3; }
            
            .card { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 50px 30px; border-radius: 15px; text-align: center; min-height: 200px; display: flex; flex-direction: column; justify-content: center; cursor: pointer; margin-bottom: 20px; transition: transform 0.3s; position: relative; }
            .card:hover { transform: scale(1.02); }
            .card .front { font-size: 28px; font-weight: 600; }
            .card .back { font-size: 22px; margin-top: 15px; opacity: 0.9; }
            .card .speak-btn { position: absolute; top: 15px; right: 15px; background: rgba(255,255,255,0.2); border: none; color: white; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 18px; }
            
            .actions-row { display: flex; gap: 10px; }
            .actions-row button { flex: 1; padding: 15px; border: none; border-radius: 10px; font-size: 16px; cursor: pointer; font-weight: 600; }
            .btn-fail { background: #ff6b6b; color: white; }
            .btn-success { background: #51cf66; color: white; }
            
            .hint { background: #f5f5ff; padding: 12px; border-radius: 8px; font-size: 13px; color: #666; margin: 10px 0; }
            
            textarea { width: 100%; padding: 15px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 14px; font-family: monospace; resize: vertical; box-sizing: border-box; }
            textarea:focus { outline: none; border-color: #667eea; }
            
            .progress { text-align: center; color: #888; margin-bottom: 15px; font-size: 14px; }
            .progress-bar { height: 6px; background: #eee; border-radius: 3px; overflow: hidden; margin-bottom: 20px; }
            .progress-fill { height: 100%; background: linear-gradient(90deg, #667eea, #764ba2); transition: width 0.3s; }
            
            .test-menu { display: flex; flex-direction: column; gap: 12px; }
            .test-option { background: #f5f5ff; padding: 20px; border-radius: 12px; cursor: pointer; transition: all 0.3s; border: 2px solid transparent; text-align: left; width: 100%; color: #333; font-size: 15px; }
            .test-option:hover { border-color: #667eea; background: #eeeaff; }
            .test-option .title { font-weight: 600; color: #667eea; margin-bottom: 5px; }
            .test-option .desc { font-size: 13px; color: #666; }
            
            .options { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
            .option-btn { background: white; border: 2px solid #e0e0e0; padding: 15px; border-radius: 10px; cursor: pointer; font-size: 16px; text-align: left; transition: all 0.2s; color: #333; position: relative; padding-right: 50px; }
            .option-btn:hover { border-color: #667eea; background: #f5f5ff; }
            .option-btn.correct { background: #d4edda; border-color: #51cf66; color: #155724; }
            .option-btn.wrong { background: #f8d7da; border-color: #ff6b6b; color: #721c24; }
            .option-btn .speak-btn { position: absolute; top: 50%; right: 10px; transform: translateY(-50%); background: #667eea; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 14px; }
            
            .answer-input { width: 100%; padding: 15px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 18px; text-align: center; margin: 20px 0; box-sizing: border-box; }
            .answer-input:focus { outline: none; border-color: #667eea; }
            .answer-input.correct { border-color: #51cf66; background: #d4edda; }
            .answer-input.wrong { border-color: #ff6b6b; background: #f8d7da; }
            
            .feedback { text-align: center; padding: 15px; border-radius: 10px; margin-top: 15px; font-weight: 600; }
            .feedback.correct { background: #d4edda; color: #155724; }
            .feedback.wrong { background: #f8d7da; color: #721c24; }
            
            .results { text-align: center; padding: 30px; }
            .results .score { font-size: 48px; font-weight: 700; color: #667eea; margin: 20px 0; }
            .results .label { color: #666; font-size: 16px; }
            
            .set-input { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 15px; margin-bottom: 10px; box-sizing: border-box; }
            .set-input:focus { outline: none; border-color: #667eea; }
            
            .active-set-badge { background: #667eea; color: white; padding: 6px 12px; border-radius: 20px; font-size: 13px; display: inline-block; margin-bottom: 15px; }
            
            .edit-input { padding: 8px; border: 2px solid #667eea; border-radius: 5px; font-size: 14px; margin-right: 5px; margin-bottom: 5px; }
            
            .lang-selector { display: flex; gap: 10px; margin-bottom: 15px; }
            .lang-option { flex: 1; padding: 15px; border: 2px solid #e0e0e0; border-radius: 10px; cursor: pointer; text-align: center; transition: all 0.2s; background: white; font-size: 15px; }
            .lang-option:hover { border-color: #667eea; }
            .lang-option.selected { border-color: #667eea; background: #eeeaff; font-weight: 600; }
            .lang-option .flag { font-size: 24px; display: block; margin-bottom: 5px; }
            
            .import-sources { display: flex; gap: 10px; margin-bottom: 15px; }
            .source-btn { flex: 1; padding: 15px; border: 2px solid #e0e0e0; border-radius: 10px; cursor: pointer; text-align: center; transition: all 0.2s; background: white; font-size: 14px; color: #333; }
            .source-btn:hover { border-color: #667eea; background: #f5f5ff; }
            .source-btn.active { border-color: #667eea; background: #eeeaff; font-weight: 600; }
            .source-btn .icon { font-size: 24px; display: block; margin-bottom: 5px; }
            
            .pdf-drop-zone { border: 2px dashed #667eea; border-radius: 10px; padding: 30px; text-align: center; background: #f5f5ff; cursor: pointer; transition: all 0.2s; margin-bottom: 15px; }
            .pdf-drop-zone:hover { background: #eeeaff; }
            .pdf-drop-zone .icon { font-size: 40px; margin-bottom: 10px; }
            .pdf-drop-zone .text { color: #666; font-size: 14px; }
            
            .pdf-loading { text-align: center; padding: 20px; color: #667eea; }
            .pdf-loading .spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid #eee; border-top-color: #667eea; border-radius: 50%; animation: spin 1s linear infinite; margin-right: 10px; vertical-align: middle; }
            @keyframes spin { to { transform: rotate(360deg); } }

            /* Папки и сеты */
            .folder-list { display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px; }
            .folder { background: #f9f9f9; border-radius: 12px; padding: 15px; border: 2px solid transparent; }
            .folder-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
            .folder-name { font-weight: 600; font-size: 16px; color: #333; display: flex; align-items: center; gap: 8px; }
            .folder-name .emoji { font-size: 20px; }
            .folder-actions { display: flex; gap: 5px; }
            .folder-actions button { background: #667eea; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 11px; }
            .folder-actions .delete { background: #ff4757; }
            
            .sets-in-folder { display: flex; flex-direction: column; gap: 8px; margin-left: 20px; }
            .set-item { background: white; padding: 12px; border-radius: 8px; cursor: pointer; transition: all 0.2s; border: 2px solid transparent; display: flex; justify-content: space-between; align-items: center; }
            .set-item:hover { border-color: #667eea; }
            .set-item.active { border-color: #667eea; background: #eeeaff; }
            .set-item .set-info { flex: 1; }
            .set-item .set-name { font-weight: 600; color: #333; font-size: 14px; }
            .set-item .set-count { color: #888; font-size: 12px; margin-top: 2px; }
            .set-item .set-actions { display: flex; gap: 5px; }
            .set-item .set-btn { background: #667eea; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 10px; }
            .set-item .set-btn.delete { background: #ff4757; }

            /* Модальное окно */
            .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 2000; justify-content: center; align-items: center; }
            .modal.active { display: flex; }
            .modal-content { background: white; border-radius: 15px; padding: 30px; max-width: 400px; width: 90%; max-height: 80vh; overflow-y: auto; }
            .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
            .modal-header h3 { margin: 0; color: #333; }
            .modal-close { background: none; border: none; font-size: 24px; cursor: pointer; color: #888; padding: 0; width: 30px; height: 30px; }

            .create-options { display: flex; flex-direction: column; gap: 12px; }
            .create-option { background: #f5f5ff; padding: 20px; border-radius: 12px; cursor: pointer; transition: all 0.3s; border: 2px solid transparent; text-align: left; }
            .create-option:hover { border-color: #667eea; background: #eeeaff; }
            .create-option .icon { font-size: 32px; margin-bottom: 10px; }
            .create-option .title { font-weight: 600; color: #667eea; font-size: 16px; margin-bottom: 5px; }
            .create-option .desc { font-size: 13px; color: #666; }

            .folder-selector { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; }
            .folder-option { padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; cursor: pointer; transition: all 0.2s; background: white; }
            .folder-option:hover { border-color: #667eea; }
            .folder-option.selected { border-color: #667eea; background: #eeeaff; font-weight: 600; }

            /* Нижняя навигация */
            .bottom-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: white; box-shadow: 0 -4px 20px rgba(0,0,0,0.1); z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
            .bottom-nav-items { display: flex; justify-content: space-around; padding: 8px 0; }
            .bottom-nav-item { display: flex; flex-direction: column; align-items: center; background: none; border: none; color: #888; font-size: 10px; cursor: pointer; padding: 5px; flex: 1; transition: color 0.2s; }
            .bottom-nav-item .icon { font-size: 22px; margin-bottom: 3px; }
            .bottom-nav-item.active { color: #667eea; }
            .bottom-nav-item.add-btn { color: #667eea; }

            /* Адаптивность */
            @media (max-width: 768px) {
                body { padding: 10px; padding-bottom: 80px; }
                .container { padding: 20px; border-radius: 15px; }
                h1 { font-size: 22px; margin-bottom: 15px; }
                h2 { font-size: 18px; }
                
                .tabs { display: none; }
                .bottom-nav { display: block; }
                
                .card { padding: 30px 20px; min-height: 150px; }
                .card .front { font-size: 24px; }
                .card .back { font-size: 18px; }
                
                .actions-row button { padding: 12px; font-size: 15px; }
                
                .word-item { padding: 10px; }
                .word-item .word { font-size: 14px; }
                .word-item .translation { font-size: 13px; display: block; margin-left: 0; margin-top: 3px; }
                .word-item .actions { flex-direction: column; gap: 3px; }
                .word-item .action-btn { padding: 6px 8px; font-size: 11px; }
                
                .test-option { padding: 15px; }
                .option-btn { padding: 12px; font-size: 15px; }
                
                .results .score { font-size: 36px; }
                
                .folder { padding: 12px; }
                .folder-name { font-size: 14px; }
                .sets-in-folder { margin-left: 15px; }
                .set-item { padding: 10px; }
                .set-item .set-name { font-size: 13px; }
            }
            
            @media (max-width: 480px) {
                body { padding: 5px; padding-bottom: 75px; }
                .container { padding: 15px; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
                h1 { font-size: 20px; }
                h2 { font-size: 16px; margin-bottom: 10px; }
                
                .card { padding: 25px 15px; min-height: 120px; margin-bottom: 15px; }
                .card .front { font-size: 20px; }
                .card .back { font-size: 16px; margin-top: 10px; }
                .card .speak-btn { top: 10px; right: 10px; padding: 6px 10px; font-size: 16px; }
                
                .actions-row { gap: 8px; }
                .actions-row button { padding: 10px; font-size: 14px; }
                
                .word-item { flex-direction: column; align-items: flex-start; gap: 8px; }
                .word-item .word-main { width: 100%; }
                .word-item .word { font-size: 15px; display: block; }
                .word-item .transcription { display: block; margin-left: 0; margin-top: 2px; font-size: 12px; }
                .word-item .translation { display: block; margin-left: 0; margin-top: 3px; font-size: 13px; }
                .word-item .actions { width: 100%; justify-content: flex-end; flex-direction: row; }
                .word-item .action-btn { padding: 8px 12px; font-size: 12px; }
                
                .edit-input { width: 100%; margin-right: 0; font-size: 13px; }
                
                textarea { font-size: 13px; padding: 12px; }
                .set-input { font-size: 14px; padding: 10px; }
                
                .lang-selector { gap: 8px; }
                .lang-option { padding: 12px; font-size: 13px; }
                .lang-option .flag { font-size: 20px; }
                
                .import-sources { gap: 8px; }
                .source-btn { padding: 12px; font-size: 13px; }
                .source-btn .icon { font-size: 20px; }
                
                .pdf-drop-zone { padding: 20px; }
                .pdf-drop-zone .icon { font-size: 30px; }
                
                .test-option { padding: 12px; font-size: 14px; }
                .option-btn { padding: 10px; font-size: 14px; padding-right: 45px; }
                .option-btn .speak-btn { padding: 4px 8px; font-size: 12px; }
                
                .answer-input { font-size: 16px; padding: 12px; }
                
                .results { padding: 20px; }
                .results .score { font-size: 32px; margin: 15px 0; }
                
                .progress { font-size: 13px; margin-bottom: 10px; }
                .hint { padding: 10px; font-size: 12px; }
                .active-set-badge { font-size: 12px; padding: 5px 10px; }
                
                .modal-content { padding: 20px; }
                .create-option { padding: 15px; }
                .create-option .icon { font-size: 28px; }
                .create-option .title { font-size: 15px; }
                
                .folder { padding: 10px; }
                .folder-name { font-size: 13px; }
                .folder-name .emoji { font-size: 18px; }
                .sets-in-folder { margin-left: 10px; gap: 6px; }
                .set-item { padding: 8px; }
                .set-item .set-name { font-size: 12px; }
                .set-item .set-count { font-size: 11px; }
            }
        </style>
    </head>
    
    <body>
        <div class="container">
            <h1>Freezlet</h1>
            
            <div class="tabs">
                <button class="nav-btn" data-screen="list" onclick="showScreen('list')">📋 Список</button>
                <button class="nav-btn" data-screen="train" onclick="showScreen('train')">🎴 Тренировка</button>
                <button class="nav-btn" data-screen="test" onclick="showScreen('test')">📝 Тест</button>
                <button class="nav-btn add-btn" onclick="openCreateModal()">+</button>
            </div>
            
            <div id="list"><h2>Список слов</h2><div id="listContent"></div></div>
            <div id="train"><h2>Тренировка</h2><div id="trainContent"></div></div>
            <div id="test"><h2>Тест</h2><div id="testContent"></div></div>
        </div>

        <!-- Модальное окно: выбор что создать -->
        <div class="modal" id="createModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Что создать?</h3>
                    <button class="modal-close" onclick="closeModal('createModal')">×</button>
                </div>
                <div class="create-options">
                    <div class="create-option" onclick="showCreateSetForm()">
                        <div class="icon">📚</div>
                        <div class="title">Новый сет</div>
                        <div class="desc">Создать набор слов для изучения</div>
                    </div>
                    <div class="create-option" onclick="showCreateFolderForm()">
                        <div class="icon">📁</div>
                        <div class="title">Новая папка</div>
                        <div class="desc">Группировать сеты по темам</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Модальное окно: создание сета -->
        <div class="modal" id="createSetModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Создать сет</h3>
                    <button class="modal-close" onclick="closeModal('createSetModal')">×</button>
                </div>
                <input type="text" class="set-input" id="newSetName" placeholder="Название сета...">
                <div style="font-size: 13px; color: #666; margin-bottom: 8px;">Выбери папку:</div>
                <div class="folder-selector" id="folderSelector"></div>
                <div style="font-size: 13px; color: #666; margin-bottom: 8px;">Выбери язык:</div>
                <div class="lang-selector">
                    <div class="lang-option selected" data-lang="en" onclick="selectNewSetLang('en')">
                        <span class="flag">🇬🇧</span>Английский
                    </div>
                    <div class="lang-option" data-lang="de" onclick="selectNewSetLang('de')">
                        <span class="flag">🇩🇪</span>Немецкий
                    </div>
                </div>
                <button class="primary" onclick="createSet()">➕ Создать</button>
            </div>
        </div>

        <!-- Модальное окно: создание папки -->
        <div class="modal" id="createFolderModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Создать папку</h3>
                    <button class="modal-close" onclick="closeModal('createFolderModal')">×</button>
                </div>
                <input type="text" class="set-input" id="newFolderName" placeholder="Название папки...">
                <button class="primary" onclick="createFolder()">📁 Создать папку</button>
            </div>
        </div>

        <nav class="bottom-nav">
            <div class="bottom-nav-items">
                <button class="bottom-nav-item" data-screen="list" onclick="showScreen('list')">
                    <span class="icon">📋</span>
                    <span>Список</span>
                </button>
                <button class="bottom-nav-item" data-screen="train" onclick="showScreen('train')">
                    <span class="icon">🎴</span>
                    <span>Тренир.</span>
                </button>
                <button class="bottom-nav-item" data-screen="test" onclick="showScreen('test')">
                    <span class="icon">📝</span>
                    <span>Тест</span>
                </button>
                <button class="bottom-nav-item add-btn" onclick="openCreateModal()">
                    <span class="icon">➕</span>
                    <span>Новый</span>
                </button>
            </div>
        </nav>
        
        <script>
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
            
            let folders = [];
            let sets = [];
            let activeSetId = null;
            let newSetLang = 'en';
            let newSetFolderId = null;
            let importSource = 'text';
            let extractedPdfText = '';
            
            let trainQueue = [];
            let trainIndex = 0;
            
            let testPassed = 0;
            let testTotal = 10;
            let testCorrect = 0;
            let currentTestType = null;
            let currentQuestion = null;
            let answered = false;
            
            const LANGS = {
                'en': { flag: '🇬🇧', name: 'Английский', code: 'en-US' },
                'de': { flag: '🇩🇪', name: 'Немецкий', code: 'de-DE' }
            };
            
            // Загрузка данных
            const savedFolders = localStorage.getItem('folders');
            if (savedFolders) {
                folders = JSON.parse(savedFolders);
            }
            
            const savedSets = localStorage.getItem('sets');
            if (savedSets) {
                sets = JSON.parse(savedSets);
                sets.forEach(s => { 
                    if (!s.lang) s.lang = 'en';
                    if (!s.folderId && folders.length > 0) s.folderId = folders[0].id;
                    if (s.words) s.words.forEach(w => { if (!w.transcription) w.transcription = ''; });
                });
                if (sets.length > 0) activeSetId = sets[0].id;
            }
            
            function parseLine(line) {
                line = line.trim();
                if (!line) return null;
                
                let transcription = '';
                let cleanLine = line;
                
                const bracketMatch = line.match(/\[([^\]]+)\]/);
                if (bracketMatch) {
                    transcription = bracketMatch[1].trim();
                    cleanLine = line.replace(bracketMatch[0], ' ').replace(/\s+/g, ' ').trim();
                } else {
                    const slashMatch = line.match(/\/([^\/]+)\//);
                    if (slashMatch) {
                        transcription = slashMatch[1].trim();
                        cleanLine = line.replace(slashMatch[0], ' ').replace(/\s+/g, ' ').trim();
                    }
                }
                
                let separator = null;
                const separators = [' - ', ' — ', ', ', ': ', ' = ', '\t'];
                for (const sep of separators) {
                    if (cleanLine.includes(sep)) { separator = sep; break; }
                }
                
                if (!separator) return null;
                
                const parts = cleanLine.split(separator);
                const word = parts[0].trim();
                const translation = parts.slice(1).join(' ').trim();
                
                if (!word || !translation) return null;
                
                return { word, transcription, translation };
            }

            async function handlePdfUpload(event) {
                const file = event.target.files[0];
                if (!file) return;
                const status = document.getElementById('pdfStatus');
                status.innerHTML = '<div class="pdf-loading"><span class="spinner"></span>Извлекаю текст...</div>';
                try {
                    const arrayBuffer = await file.arrayBuffer();
                    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                    let fullText = '';
                    for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
                        const page = await pdf.getPage(pageNum);
                        const textContent = await page.getTextContent();
                        const lines = {};
                        textContent.items.forEach(item => {
                            const y = Math.round(item.transform[5]);
                            if (!lines[y]) lines[y] = [];
                            lines[y].push({ x: item.transform[4], str: item.str });
                        });
                        const sortedYs = Object.keys(lines).map(Number).sort((a, b) => b - a);
                        sortedYs.forEach(y => {
                            const sortedItems = lines[y].sort((a, b) => a.x - b.x);
                            const lineText = sortedItems.map(i => i.str).join(' ');
                            if (lineText.trim()) fullText += lineText.trim() + '\n';
                        });
                    }
                    extractedPdfText = fullText.replace(/\n{3,}/g, '\n\n').trim();
                    status.innerHTML = `<div class="hint" style="background:#d4edda;">✅ Извлечено ${pdf.numPages} стр.</div>`;
                    renderImportBody();
                } catch (err) {
                    status.innerHTML = `<div class="hint" style="background:#f8d7da;">❌ Ошибка: ${err.message}</div>`;
                }
            }

            function startTest(type) {
                currentTestType = type;

                testTotal = Math.min(10, getActiveSet().words.length);
                testCorrect = 0;

                nextQuestion();

            function nextQuestion() {
                if (testPassed >= testTotal) { showResults(); return; }
                answered = false;
                const correctWord = getActiveSet().words[Math.floor(Math.random() * getActiveSet().words.length)];
                if (currentTestType === 1) renderTest1(correctWord);
                else if (currentTestType === 2) renderTest2(correctWord);
                else if (currentTestType === 3) renderTest3(correctWord);
            }
            
            function renderTest1(correctWord) {
                const container = document.getElementById('testContent');
                const activeSet = getActiveSet();
                const wrongOptions = [];
                const pool = activeSet.words.filter(w => w.translation !== correctWord.translation);
                while (wrongOptions.length < 3 && pool.length > 0) {
                    const idx = Math.floor(Math.random() * pool.length);
                    wrongOptions.push(pool.splice(idx, 1)[0]);
                }
                const allOptions = [correctWord, ...wrongOptions];
                for (let i = allOptions.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [allOptions[i], allOptions[j]] = [allOptions[j], allOptions[i]];
                }
                currentQuestion = { correct: correctWord, options: allOptions };
                container.innerHTML = `
                    <div class="active-set-badge">${LANGS[activeSet.lang].flag} ${activeSet.name}</div>
                    <div class="progress">${testPassed + 1} / ${testTotal} · ✅ ${testCorrect}</div>
                    <div class="progress-bar"><div class="progress-fill" style="width: ${(testPassed / testTotal) * 100}%"></div></div>
                    <div class="card" style="cursor: default; min-height: 120px;">
                        <button class="speak-btn" onclick="speak('${correctWord.word.replace(/'/g, "\\'")}')">🔊</button>
                        <div class="front">${correctWord.word}</div>
                    </div>
                    <div class="options">
                        ${allOptions.map((opt, i) => `
                            <button class="option-btn" onclick="checkTest1(${i})">
                                ${opt.translation}
                                <button class="speak-btn" onclick="event.stopPropagation(); speak('${opt.word.replace(/'/g, "\\'")}')">🔊</button>
                            </button>
                        `).join('')}
                    </div>
                `;
            }
            
            function checkTest1(index) {
                if (answered) return;
                answered = true;
                const selected = currentQuestion.options[index];
                const isCorrect = selected.translation === currentQuestion.correct.translation;
                const buttons = document.querySelectorAll('.option-btn');
                buttons.forEach((btn, i) => {
                    if (currentQuestion.options[i].translation === currentQuestion.correct.translation) btn.classList.add('correct');
                    else if (i === index && !isCorrect) btn.classList.add('wrong');
                    btn.onclick = null;
                });
                if (isCorrect) testCorrect++;
                testPassed++;
                setTimeout(nextQuestion, 1200);
            }
            
            function renderTest2(correctWord) {
                const container = document.getElementById('testContent');
                const activeSet = getActiveSet();
                const isTruePair = Math.random() < 0.5;
                let shownTranslation = isTruePair ? correctWord.translation : activeSet.words.filter(w => w.translation !== correctWord.translation)[Math.floor(Math.random() * activeSet.words.filter(w => w.translation !== correctWord.translation).length)].translation;
                currentQuestion = { correct: correctWord, isTruePair, shownTranslation };
                container.innerHTML = `
                    <div class="active-set-badge">${LANGS[activeSet.lang].flag} ${activeSet.name}</div>
                    <div class="progress">${testPassed + 1} / ${testTotal} · ✅ ${testCorrect}</div>
                    <div class="progress-bar"><div class="progress-fill" style="width: ${(testPassed / testTotal) * 100}%"></div></div>
                    <div class="card" style="cursor: default; min-height: 150px;">
                        <button class="speak-btn" onclick="speak('${correctWord.word.replace(/'/g, "\\'")}')">🔊</button>
                        <div class="front">${correctWord.word}</div>
                        <div class="back">${shownTranslation}</div>
                    </div>
                    <div class="actions-row">
                        <button class="btn-fail" onclick="checkTest2(false)">❌ Неверно</button>
                        <button class="btn-success" onclick="checkTest2(true)">✅ Верно</button>
                    </div>
                `;
            }
            
            function checkTest2(userSaysTrue) {
                if (answered) return;
                answered = true;
                const isCorrect = userSaysTrue === currentQuestion.isTruePair;
                if (isCorrect) testCorrect++;
                testPassed++;
                setTimeout(nextQuestion, 1200);
            }
            
            function renderTest3(correctWord) {
                const container = document.getElementById('testContent');
                currentQuestion = { correct: correctWord };
                container.innerHTML = `
                    <div class="active-set-badge">${LANGS[activeSet.lang].flag} ${activeSet.name}</div>
                    <div class="progress">${testPassed + 1} / ${testTotal} · ✅ ${testCorrect}</div>
                    <div class="progress-bar"><div class="progress-fill" style="width: ${(testPassed / testTotal) * 100}%"></div></div>
                    <div class="card" style="cursor: default; min-height: 120px;">
                        <div class="front">${correctWord.translation}</div>
                        <div class="back" style="opacity:0.7;">Впиши слово</div>
                    </div>
                    <input type="text" class="answer-input" id="answerInput" placeholder="Твой ответ..." autocomplete="off">
                    <button class="primary" onclick="checkTest3()">Проверить</button>
                `;
                const input = document.getElementById('answerInput');
                input.focus();
                input.addEventListener('keypress', (e) => { if (e.key === 'Enter') checkTest3(); });
            }
            
            function checkTest3() {
                if (answered) return;
                const input = document.getElementById('answerInput');
                const userAnswer = input.value.trim().toLowerCase();
                const correctAnswer = currentQuestion.correct.word.toLowerCase();
                if (userAnswer === '') return;
                answered = true;
                const isCorrect = userAnswer === correctAnswer;
                input.classList.add(isCorrect ? 'correct' : 'wrong');
                input.disabled = true;
                if (isCorrect) testCorrect++;
                testPassed++;
                setTimeout(nextQuestion, 1500);
            }
            
            function showResults() {
                const container = document.getElementById('testContent');
                const activeSet = getActiveSet();
                const percent = Math.round((testCorrect / testTotal) * 100);
                let emoji = '🎉', message = 'Отлично!';
                if (percent < 50) { emoji = '💪'; message = 'Нужно ещё практиковаться!'; }
                else if (percent < 80) { emoji = '👍'; message = 'Хороший результат!'; }
                container.innerHTML = `
                    <div class="results">
                        <div class="active-set-badge">${LANGS[activeSet.lang].flag} ${activeSet.name}</div>
                        <div style="font-size: 64px;">${emoji}</div>
                        <div class="score">${testCorrect} / ${testTotal}</div>
                        <div class="label">${percent}% правильно</div>
                        <div class="label" style="margin-top: 10px;">${message}</div>
                        <button class="primary" onclick="startTest(${currentTestType})">🔄 Ещё раз</button>
                        <button class="primary" style="background:#888;" onclick="showTestMenu()">← В меню</button>
                    </div>
                `;
            }
            
            showScreen('list');
        </script>
    </body>
</html>
